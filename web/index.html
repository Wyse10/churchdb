<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChurchDB Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <!-- Login Section -->
    <section id="loginSection" class="login-section">
      <div class="login-container">
        <h1>ChurchDB Management System</h1>
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input
              id="username"
              type="text"
              placeholder="Enter username"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input
              id="password"
              type="password"
              placeholder="Enter password"
              required
            />
          </div>
          <button type="submit" class="login-btn">Login</button>
          <p id="loginError" class="error-message"></p>
        </form>
      </div>
    </section>

    <!-- Chat Section -->
    <main id="chatSection" class="app-shell" style="display: none;">
      <header class="app-header">
        <div>
          <h1>ChurchDB Assistant</h1>
          <p>Manage members using plain English.</p>
        </div>
        <div class="user-info">
          <div class="user-details">
            <span id="userDisplay"></span>
            <span id="roleDisplay" class="role-badge"></span>
          </div>
          <button id="auditLogBtn" class="audit-btn" title="View activity log">📝 Logs</button>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
      </header>

      <!-- Tabs -->
      <div class="tabs">
        <button id="chatTabBtn" class="tab-btn active" onclick="switchTab('chat')">Chat</button>
        <button id="auditTabBtn" class="tab-btn" onclick="switchTab('audit')">Activity Log</button>
      </div>

      <!-- Chat Tab -->
      <div id="chatTab" class="tab-content active">
        <div class="chat-header">
          <button id="refreshChatBtn" class="refresh-btn" title="Clear chat and start over">🔄 Refresh</button>
        </div>
        <section id="chatWindow" class="chat-window" aria-live="polite"></section>
        
        <!-- Menu Dropdown (hidden by default) -->
        <div id="menuDropdown" class="menu-dropdown" style="display: none;">
          <label for="commandSelect">Select a command:</label>
          <select id="commandSelect" class="command-select">
            <option value="">Choose an action...</option>
          </select>
          <button id="selectBtn" type="button" class="select-btn">Select</button>
        </div>
        
        <!-- Chat Form (hidden when menu is shown) -->
        <form id="chatForm" class="chat-form" style="display: none;">
          <input
            id="messageInput"
            type="text"
            placeholder="Type a command (e.g. Show all choir members)"
            autocomplete="off"
            
          />
          <button type="submit">Send</button>
        </form>
      </div>

      <!-- Audit Log Tab -->
      <div id="auditTab" class="tab-content">
        <section id="auditLogWindow" class="audit-window"></section>
        <button id="refreshLogsBtn" class="refresh-btn">Refresh Logs</button>
      </div>
    </main>

    <script src="/static/chat.js"></script>
  </body>
</html>
